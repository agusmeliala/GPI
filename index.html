<div id="fullscreenModal" class="fixed inset-0 bg-black bg-opacity-90 hidden items-center justify-center z-50">
  <img id="fullscreenImg" class="max-w-full max-h-full rounded-lg shadow-2xl">
</div>

<!-- SCRIPT -->
<script>
  const slider = document.getElementById("galeriSlider");

  // DUPLIKAT agar loop halus (infinite)
  slider.innerHTML += slider.innerHTML;

  // AUTO SCROLL HALUS
  function autoScroll() {
    slider.scrollLeft += 0.5;

    if (slider.scrollLeft >= slider.scrollWidth / 2) {
      slider.scrollLeft = 0;
    }

    requestAnimationFrame(autoScroll);
  }

  autoScroll();

  // FULLSCREEN (klik sekali buka, klik lagi tutup)
  const modal = document.getElementById("fullscreenModal");
  const modalImg = document.getElementById("fullscreenImg");

  slider.querySelectorAll("img").forEach(img => {
    img.addEventListener("click", () => {
      if (modal.classList.contains("hidden")) {
        modal.classList.remove("hidden");
        modal.classList.add("flex");
        modalImg.src = img.src;
      } else {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      }
    });
  });

  // klik background juga bisa tutup
  modal.addEventListener("click", () => {
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  });
</script>

<script>
  function updateDateTime() {
    const el = document.getElementById("datetime");
    if (!el) return;

    const now = new Date();

    const text = now.toLocaleString("id-ID", {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    });

    el.innerText = text;
  }

  updateDateTime();
  setInterval(updateDateTime, 60000);
</script>
