<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPI Jemaat Bersinar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Memastikan gambar kop selalu proporsional */
        .img-kop { width: 100%; height: auto; display: block; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen font-sans">

    <div class="max-w-5xl mx-auto w-full px-4 mb-20">
        
        <header class="bg-white shadow-md rounded-b-3xl overflow-hidden py-6 px-4 mt-2">
            <div class="flex flex-col">
                <img src="images/kop-surat.png" alt="Kop Surat GPI" class="img-kop">
                
                <div class="flex justify-end mt-4">
                    <div class="inline-flex items-center bg-blue-50 px-4 py-2 rounded-full border border-blue-100 shadow-sm">
                        <p id="datetime" class="text-[10px] md:text-xs font-bold text-blue-600 uppercase tracking-tighter"></p>
                    </div>
                </div>
            </div>
        </header>

        <section class="mt-10">
            <div class="flex items-center justify-between mb-6 border-l-4 border-blue-600 pl-4">
                <h2 class="text-2xl font-black text-gray-800 tracking-tight">JADWAL IBADAH</h2>
                <span class="text-[10px] font-bold bg-blue-600 text-white px-3 py-1 rounded-full uppercase">Update Terbaru</span>
            </div>
            <div class="bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden">
                <ul id="jadwal" class="divide-y divide-gray-100">
                    <li class="p-10 text-center text-gray-400 font-medium italic animate-pulse">Memuat data jadwal...</li>
                </ul>
            </div>
        </section>

        <section class="mt-14">
            <div class="bg-white rounded-[2rem] shadow-xl border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-8 py-5 border-b border-gray-100 flex items-center">
                    <div class="w-3 h-6 bg-blue-600 rounded-full mr-4"></div>
                    <h2 class="text-xl font-bold text-gray-800">INFORMASI & POSTER</h2>
                </div>
                <div class="p-6 md:p-12 flex justify-center bg-white">
                    <img id="poster-harian" src="images/poster1.jpg" alt="Poster Gereja" 
                         class="w-full max-w-2xl h-auto rounded-2xl shadow-2xl transition-all duration-500 hover:scale-[1.02]">
                </div>
            </div>
        </section>

        <section class="max-w-3xl mx-auto mt-14">
            <div class="bg-white rounded-[2.5rem] shadow-2xl border-t-[10px] border-blue-600 p-10 text-center overflow-hidden relative">
                <div id="konten-renungan">
                    <p class="text-gray-400 italic">Menyiapkan renungan harian...</p>
                </div>
            </div>
        </section>

    </div> <footer class="mt-auto py-12 text-center text-gray-400 text-xs font-bold uppercase tracking-widest border-t border-gray-100">
        &copy; 2026 GPI Jemaat Bersinar • Medan Labuhan
    </footer>

    <script src="script.js"></script>

</body>
</html>
