<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPI Jemaat Bersinar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <header class="w-full bg-white shadow-sm border-b border-gray-100 py-4">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex justify-center">
                <img src="images/kop-surat.png" alt="Kop Surat GPI" class="w-full h-auto">
            </div>
            <div class="flex justify-end mt-2">
                <div class="inline-flex items-center space-x-2 bg-gray-50 px-3 py-1 rounded-full border border-gray-200">
                    <p id="datetime" class="text-[10px] md:text-xs font-bold text-gray-500 uppercase tracking-tight"></p>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow pb-20">
        <section class="max-w-5xl mx-auto px-4 mt-8">
            <div class="flex items-center justify-between mb-4 border-l-4 border-blue-600 pl-4">
                <h2 class="text-2xl font-bold text-gray-800 tracking-tight">Jadwal Ibadah</h2>
                <span class="text-xs font-semibold bg-blue-50 text-blue-600 px-3 py-1 rounded-full">Update Terbaru</span>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <ul id="jadwal" class="divide-y divide-gray-100">
                    <li class="p-10 text-center text-gray-400 italic">Memuat jadwal...</li>
                </ul>
            </div>
        </section>

        <section class="max-w-5xl mx-auto px-4 mt-12">
            <div class="bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-6 py-4 border-b border-gray-100">
                    <h2 class="text-xl font-bold text-gray-800">Informasi & Poster</h2>
                </div>
                <div class="p-4 md:p-8 flex justify-center bg-gray-50/30">
                    <img id="poster-harian" src="images/poster1.jpg" alt="Poster Gereja" 
                         class="w-full max-w-2xl h-auto rounded-2xl shadow-md transition-transform duration-500 hover:scale-[1.02]">
                </div>
            </div>
        </section>

        <section class="max-w-3xl mx-auto px-4 mt-12">
            <div class="bg-white rounded-3xl shadow-xl border-t-4 border-blue-600 overflow-hidden text-center p-8">
                <div id="konten-renungan">
                    <p class="animate-pulse">Menyiapkan renungan...</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-gray-400 text-sm">
        &copy; 2026 GPI Jemaat Bersinar
    </footer>

    <script src="script.js"></script>
</body>
</html>
