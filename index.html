<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPI Jemaat Bersinar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <div class="max-w-5xl mx-auto w-full px-4 mb-20">
        
        <header class="bg-white shadow-sm rounded-b-2xl overflow-hidden py-4 px-2">
            <div class="flex flex-col">
                <img src="images/kop-surat.png" alt="Kop Surat GPI" class="w-full h-auto block">
                
                <div class="flex justify-end mt-3 pr-2">
                    <div class="inline-flex items-center space-x-2 bg-gray-50 px-3 py-1 rounded-full border border-gray-100">
                        <p id="datetime" class="text-[10px] md:text-xs font-bold text-gray-500 uppercase tracking-tighter"></p>
                    </div>
                </div>
            </div>
        </header>

        <section class="mt-8">
            <div class="flex items-center justify-between mb-4 border-l-4 border-blue-600 pl-4">
                <h2 class="text-2xl font-bold text-gray-800">Jadwal Ibadah</h2>
                <span class="text-xs font-semibold bg-blue-50 text-blue-600 px-3 py-1 rounded-full">Terupdate</span>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <ul id="jadwal" class="divide-y divide-gray-100">
                    <li class="p-10 text-center text-gray-400">Memuat jadwal...</li>
                </ul>
            </div>
        </section>

        <section class="mt-12">
            <div class="bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-6 py-4 border-b border-gray-100 flex items-center">
                    <div class="w-2 h-5 bg-blue-600 rounded-full mr-3"></div>
                    <h2 class="text-xl font-bold text-gray-800">Poster Gereja</h2>
                </div>
                <div class="p-4 md:p-8 flex justify-center bg-gray-50/20 text-center">
                    <img id="poster-harian" src="images/poster1.jpg" alt="Poster Gereja" 
                         class="w-full max-w-2xl h-auto rounded-2xl shadow-md transition-transform duration-500 hover:scale-[1.01]">
                </div>
            </div>
        </section>

        <section class="max-w-3xl mx-auto mt-12">
            <div class="bg-white rounded-3xl shadow-xl border-t-8 border-blue-600 p-8 text-center overflow-hidden">
                <div id="konten-renungan">
                    <p class="animate-pulse">Menyiapkan renungan...</p>
                </div>
            </div>
        </section>

    </div> <footer class="mt-auto py-10 text-center text-gray-400 text-sm">
        &copy; 2026 GPI Jemaat Bersinar
    </footer>

    <script src="script.js"></script>

</body>
</html>
