<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPI Jemaat Bersinar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

  <!-- Header -->
<header class="flex justify-center mt-2 mb-4">
  <img src="images/kop-surat.png" 
       class="w-full max-w-5xl block mx-auto"
       style="image-rendering: crisp-edges;">
</header>
  <!-- Jadwal Ibadah -->
  <section class="container mx-auto my-8 px-4">
    <h2 class="text-2xl font-semibold mb-4 text-center">Jadwal Ibadah</h2>
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-md p-6">
      <ul class="space-y-2 text-center">
        <li class="bg-blue-100 py-2 rounded-md">Minggu (Ibadah Raya) • 10:30 WIB</li>
        <li class="bg-blue-100 py-2 rounded-md">Selasa (Ibadah Keluarga) • 19:00 WIB</li>
        <li class="bg-blue-100 py-2 rounded-md">Jumat (Doa Malam) • 19:00 WIB</li>
      </ul>
  
    </div>
  </section>

  <!-- Poster -->
  <section class="container mx-auto my-12 px-4">
  <div class="text-center mb-8">
    <h2 class="text-3xl md:text-4xl font-bold text-gray-800">
      Poster Ibadah
    </h2>
    <p id="hariSekarang" class="text-gray-500 mt-2"></p>
  </div>

  <div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-3xl shadow-xl p-4 md:p-6">

      <div class="overflow-hidden rounded-2xl">
        <img id="posterImg"
             src="images/poster1.jpg"
             alt="Poster Ibadah"
             class="w-full h-auto max-h-[500px] object-contain transition duration-500 hover:scale-105">
      </div>

    </div>
  </div>
</section>

  <!-- Galeri -->
  <section class="container mx-auto my-8 px-4">
    <h2 class="text-2xl font-semibold mb-4 text-center">Galeri Foto</h2>
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-md p-4 overflow-hidden">
      <div class="flex animate-scroll space-x-4">
        <img src="images/foto1.jpg" alt="Foto 1" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto2.jpg" alt="Foto 2" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto3.jpg" alt="Foto 3" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto4.jpg" alt="Foto 4" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto5.jpg" alt="Foto 5" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto6.jpg" alt="Foto 6" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto7.jpg" alt="Foto 7" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto8.jpg" alt="Foto 8" class="w-40 h-28 object-cover rounded-lg shadow">
      </div>
    </div>
  </section>

  <!-- Renungan Harian -->
  <section class="container mx-auto my-8 px-4">
    <h2 class="text-2xl font-semibold mb-4 text-center">Renungan Harian</h2>
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-md p-6 text-center">
      <p id="renungan-ayat" class="text-lg font-bold text-blue-800 mb-2"></p>
      <p id="renungan-keterangan" class="text-gray-700"></p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="py-6">
    <div class="max-w-3xl mx-auto bg-gray-900 text-white rounded-2xl shadow-md py-4 text-center">
      <p>&copy; 2025 GPI Jemaat Bersinar | Jl. Kapten Raden Sulian, Belawan</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
  const posterList = [
    "images/poster1.jpg", // Senin
    "images/poster2.jpg", // Selasa
    "images/poster3.jpg", // Rabu
    "images/poster4.jpg", // Kamis
    "images/poster5.jpg", // Jumat
    "images/poster6.jpg", // Sabtu
    "images/poster7.jpg"  // Minggu
  ];

  const hariNama = [
    "Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"
  ];

  const today = new Date().getDay();

  // Atur index (Senin = 0, Minggu = 6)
  const index = today === 0 ? 6 : today - 1;

  // Ganti gambar otomatis
  document.getElementById("posterImg").src = posterList[index];

  // Tampilkan nama hari
  document.getElementById("hariSekarang").innerText =
    "Poster untuk hari " + hariNama[today];
</script>
</body>
</html>
