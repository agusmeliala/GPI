<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPI Jemaat Bersinar | Portal Resmi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-serif-elegant { font-family: 'Playfair Display', serif; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .shadow-soft { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-[#FBFBFE] text-slate-900 flex flex-col min-h-screen antialiased" x-data="{ openLightbox: false, activeImg: '' }">

    <template x-teleport="body">
        <div x-show="openLightbox" 
             x-transition:enter="transition ease-out duration-300" 
             x-transition:enter-start="opacity-0" 
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-200" 
             x-transition:leave-start="opacity-100" 
             x-transition:leave-end="opacity-0"
             class="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4" 
             x-cloak>
            <button @click="openLightbox = false" class="absolute top-6 right-6 text-white hover:text-blue-400 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <img :src="activeImg" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl object-contain">
        </div>
    </template>

    <div class="max-w-4xl mx-auto w-full px-4 sm:px-6 mb-24">
        
        <header class="bg-white shadow-soft rounded-b-[2.5rem] overflow-hidden mt-0 border-x border-b border-slate-100 sticky top-0 z-40 glass-header">
            <div class="w-full">
                <img src="images/kop-surat.png" alt="Kop Surat" class="w-full h-auto block">
                <div class="flex justify-center md:justify-end -mt-3 mb-5 px-6">
                    <div class="bg-blue-600 text-white px-4 py-1.5 rounded-full shadow-lg flex items-center gap-2">
                        <div class="w-2 h-2 bg-white rounded-full animate-pulse"></div>
                        <p id="datetime" class="text-[10px] md:text-xs font-bold tracking-tight"></p>
                    </div>
                </div>
            </div>
        </header>

        <section class="mt-12">
            <div class="flex items-center justify-between mb-8 px-2">
                <div>
                    <h2 class="text-2xl font-800 text-slate-900 tracking-tight">Jadwal Ibadah</h2>
                    <p class="text-xs text-slate-500 font-semibold uppercase tracking-widest mt-1">Minggu Ini</p>
                </div>
                <div class="h-12 w-12 bg-blue-50 rounded-2xl flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                </div>
            </div>
            
            <div class="bg-white rounded-[2rem] shadow-soft border border-slate-50 overflow-hidden">
                <div id="jadwal" class="divide-y divide-slate-50">
                    </div>
            </div>
        </section>

        <section class="mt-16">
            <h3 class="text-center text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Warta Jemaat</h3>
            <div class="bg-slate-100 rounded-[2.5rem] p-3 md:p-6 shadow-inner">
                <img id="poster-harian" src="images/poster1.jpg" alt="Poster" 
                     @click="activeImg = $el.src; openLightbox = true"
                     class="w-full h-auto rounded-[2rem] shadow-2xl cursor-zoom-in hover:brightness-95 transition duration-500">
            </div>
        </section>

        <section class="mt-16">
            <div class="mb-8 px-2 text-center">
                <h2 class="text-2xl font-800 text-slate-900 tracking-tight">Galeri Kegiatan</h2>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                <template x-for="i in [1, 2, 3, 4, 5, 6]">
                    <div class="aspect-square overflow-hidden rounded-2xl bg-slate-200 shadow-sm group">
                        <img :src="`images/galeri${i}.jpg`" 
                             @click="activeImg = $el.src; openLightbox = true"
                             class="w-full h-full object-cover cursor-pointer group-hover:scale-110 transition duration-700"
                             onerror="this.src='https://placehold.co/400x400?text=GPI+Jemaat+Bersinar'">
                    </div>
                </template>
            </div>
        </section>

        <section class="max-w-2xl mx-auto mt-16">
            <div class="bg-gradient-to-br from-blue-700 to-indigo-900 rounded-[3rem] p-10 md:p-14 text-center text-white shadow-2xl relative overflow-hidden">
                <div class="absolute -top-10 -left-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                <div id="konten-renungan" class="relative z-10">
                    </div>
            </div>
        </section>

    </div>

    <footer class="mt-auto py-12 text-center bg-white border-t border-slate-100 px-6">
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.4em] leading-relaxed">
            &copy; 2026 GPI Jemaat Bersinar <br class="md:hidden"> 
            <span class="mx-3 opacity-20">|</span> Medan Labuhan
        </p>
    </footer>

    <script>
        // DATA TETAP (Sesuai File Anda)
        const posterList = ["images/poster7.jpg", "images/poster1.jpg", "images/poster2.jpg", "images/poster3.jpg", "images/poster4.jpg", "images/poster5.jpg", "images/poster6.jpg"];
        const daftarJadwal = [
            { nama: "Anak Sekolah Minggu", jam: "08:30", kategori: "Utama" },
            { nama: "Ibadah Umum", jam: "10:30", kategori: "Utama" },
            { nama: "Ibadah Rumah Tangga", jam: "19:00", kategori: "Sektoral" }
        ];
        const daftarRenungan = [
            { hari: "Minggu / Sunday", nats: "Mazmur 118:24", isiInd: "Inilah hari yang dijadikan TUHAN, marilah kita bersorak-sorak dan bersukacita karenanya!", isiEng: "This is the day the LORD has made; let us rejoice and be glad in it." },
            { hari: "Senin / Monday", nats: "Mazmur 23:1", isiInd: "TUHAN adalah gembalaku, takkan kekurangan aku.", isiEng: "The LORD is my shepherd, I shall not be in want." },
            { hari: "Selasa / Tuesday", nats: "Filipi 4:6", isiInd: "Janganlah hendaknya kamu kuatir tentang apapun juga.", isiEng: "Do not be anxious about anything." },
            { hari: "Rabu / Wednesday", nats: "Amsal 3:5", isiInd: "Percayalah kepada TUHAN dengan segenap hatimu.", isiEng: "Trust in the LORD with all your heart." },
            { hari: "Kamis / Thursday", nats: "Yesaya 41:10", isiInd: "Janganlah takut, sebab Aku menyertai engkau.", isiEng: "So do not fear, for I am with you." },
            { hari: "Jumat / Friday", nats: "Yohanes 14:6", isiInd: "Akulah jalan dan kebenaran dan hidup.", isiEng: "I am the way and the truth and the life." },
            { hari: "Sabtu / Saturday", nats: "1 Korintus 16:14", isiInd: "Lakukanlah segala pekerjaanmu dalam kasih!", isiEng: "Do everything in love." }
        ];

        function updateOtomatis() {
            const sekarang = new Date();
            const hariIni = sekarang.getDay();

            // Render Waktu
            const elWaktu = document.getElementById('datetime');
            if (elWaktu) {
                const opsi = { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit' };
                elWaktu.innerText = sekarang.toLocaleDateString('id-ID', opsi).replace(/\./g, ':');
            }

            // Render Poster
            const elPoster = document.getElementById('poster-harian');
            if (elPoster) elPoster.src = posterList[hariIni];

            // Render Jadwal (UI UX Improved)
            const elJadwal = document.getElementById('jadwal');
            if (elJadwal) {
                elJadwal.innerHTML = daftarJadwal.map(item => `
                    <div class="flex justify-between items-center p-6 md:p-8 hover:bg-blue-50/50 transition duration-300">
                        <div class="flex flex-col gap-1">
                            <span class="text-[9px] font-black text-blue-600 uppercase tracking-widest">${item.kategori}</span>
                            <span class="text-base md:text-lg font-bold text-slate-800">${item.nama}</span>
                        </div>
                        <div class="bg-slate-50 border border-slate-100 text-slate-900 font-800 px-4 py-2 rounded-xl text-xs md:text-sm shadow-sm font-mono">
                            ${item.jam} <span class="text-[10px] text-slate-400 font-sans ml-0.5">WIB</span>
                        </div>
                    </div>
                `).join('');
            }

            // Render Renungan (Typography focused)
            const elRenungan = document.getElementById('konten-renungan');
            if (elRenungan) {
                const r = daftarRenungan[hariIni];
                elRenungan.innerHTML = `
                    <p class="text-[10px] font-black uppercase tracking-[0.4em] mb-8 text-blue-200 opacity-80">${r.hari}</p>
                    <h4 class="text-xl md:text-2xl font-serif-elegant italic mb-6 leading-relaxed">"${r.nats}"</h4>
                    <p class="text-lg md:text-xl font-semibold leading-relaxed mb-10 text-white">${r.isiInd}</p>
                    <div class="h-px w-12 bg-blue-400/30 mx-auto mb-8"></div>
                    <p class="text-sm md:text-md text-blue-100/70 italic leading-relaxed font-light">"${r.isiEng}"</p>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateOtomatis();
            setInterval(updateOtomatis, 1000);
        });
    </script>
</body>
</html>
