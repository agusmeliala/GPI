<!-- FULLSCREEN -->
<div id="full" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; justify-content:center; align-items:center;">
  <img id="fullimg" style="max-width:90%; max-height:90%;">
</div>

<script>
window.onload = function() {

  const slider = document.getElementById("slider");

  // DUPLIKAT (biar jalan terus)
  slider.innerHTML += slider.innerHTML;

  let jalan = 0;

  setInterval(function() {
    jalan++;
    slider.scrollLeft = jalan;

    if (jalan >= slider.scrollWidth / 2) {
      jalan = 0;
    }
  }, 15); // makin kecil makin halus

  // FULLSCREEN
  const full = document.getElementById("full");
  const fullimg = document.getElementById("fullimg");

  document.querySelectorAll("#slider img").forEach(img => {
    img.onclick = function() {
      full.style.display = "flex";
      fullimg.src = this.src;
    }
  });

  full.onclick = function() {
    full.style.display = "none";
  }

}
</script>

  const posterList = [

    "images/poster6.jpg", // Sabtu
    "images/poster7.jpg"  // Minggu

  const hariNama = [
    "Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"
  ];

  const today = new Date().getDay();

  // Atur index (Senin = 0, Minggu = 6)
  const index = today === 0 ? 6 : today - 1;

</script>
  </div>
<script>
  function updateDateTime() {
    const el = document.getElementById("datetime");
    if (!el) return;

    const now = new Date();

    const text = now.toLocaleString("id-ID", {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    });

    el.innerText = text;
  }

  updateDateTime();
  setInterval(updateDateTime, 60000);
</script>
