<!DOCTYPE html>
<html lang="id">
<header class="w-full bg-white shadow-sm border-b border-gray-100 py-4 mb-6">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <div class="flex flex-col items-center">
      <img src="images/kop-surat.png" 
           alt="Kop Surat GPI" 
           class="w-full h-auto object-contain drop-shadow-sm" 
           style="image-rendering: -webkit-optimize-contrast; max-height: 180px;">
    </div>

    <div class="flex justify-end mt-3 border-t border-gray-50 pt-2">
      <div class="flex items-center space-x-2 text-gray-500 bg-gray-50 px-3 py-1 rounded-full">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p id="datetime" class="text-xs md:text-sm font-medium tracking-wide uppercase"></p>
      </div>
    </div>

  </div>
</header>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

  <!-- Header -->
<header class="flex justify-center mt-2 mb-4">
  <img src="images/kop-surat.png" 
       class="w-full max-w-5xl block mx-auto"
       style="image-rendering: crisp-edges;">
</header>
  <!-- Jadwal Ibadah -->
  <section class="max-w-5xl mx-auto px-4 mt-8">
  <div class="flex items-center justify-between mb-5 border-l-4 border-blue-600 pl-4">
    <div>
      <h2 class="text-2xl font-bold text-gray-800 tracking-tight">Jadwal Ibadah</h2>
      <p class="text-sm text-gray-500">Informasi pelaksanaan ibadah jemaat</p>
    </div>
    <span class="hidden md:block text-xs font-semibold bg-blue-50 text-blue-600 px-3 py-1 rounded-full border border-blue-100">
      Update Terbaru
    </span>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <ul id="jadwal" class="divide-y divide-gray-100">
      <li class="p-10 text-center">
        <div class="animate-pulse text-gray-400 font-medium">Menyusun jadwal...</div>
      </li>
    </ul>
  </div>
</section>
  <!-- Poster -->
  <section class="container mx-auto my-8 px-4">
    <h2 class="text-2xl font-semibold mb-4 text-center">Poster Ibadah</h2>
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-md p-4 flex justify-center">
      <img src="images/poster.jpg" alt="Poster Ibadah"
           class="rounded-xl shadow max-h-[400px] object-contain">
    </div>
  </section>

  <!-- Galeri -->
  <section class="container mx-auto my-8 px-4">
    <h2 class="text-2xl font-semibold mb-4 text-center">Galeri Foto</h2>
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-md p-4 overflow-hidden">
      <div class="flex animate-scroll space-x-4">
        <img src="images/foto1.jpg" alt="Foto 1" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto2.jpg" alt="Foto 2" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto3.jpg" alt="Foto 3" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto4.jpg" alt="Foto 4" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto5.jpg" alt="Foto 5" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto6.jpg" alt="Foto 6" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto7.jpg" alt="Foto 7" class="w-40 h-28 object-cover rounded-lg shadow">
        <img src="images/foto8.jpg" alt="Foto 8" class="w-40 h-28 object-cover rounded-lg shadow">
      </div>
    </div>
  </section>

  <!-- Renungan Harian -->
  <section class="container mx-auto my-8 px-4">
    <h2 class="text-2xl font-semibold mb-4 text-center">Renungan Harian</h2>
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-md p-6 text-center">
      <p id="renungan-ayat" class="text-lg font-bold text-blue-800 mb-2"></p>
      <p id="renungan-keterangan" class="text-gray-700"></p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="py-6">
    <div class="max-w-3xl mx-auto bg-gray-900 text-white rounded-2xl shadow-md py-4 text-center">
      <p>&copy; 2025 GPI Jemaat Bersinar | Jl. Kapten Raden Sulian, Belawan</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
