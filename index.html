<style>
/* === GALERI === */
.gallery-container {
  width: 100%;
  overflow: hidden;
  position: relative;
  background: #000;
}

.gallery-track {
  display: flex;
  width: calc(300px * 60);
  animation: scroll 40s linear infinite;
}

.gallery-item {
  width: 300px;
  height: 200px;
  flex-shrink: 0;
  margin: 5px;
  cursor: pointer;
  transition: transform 0.3s;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 10px;
}

/* Smooth jalan */
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Hover efek */
.gallery-item:hover {
  transform: scale(1.05);
}

/* Fullscreen */
.fullscreen {
  position: fixed !important;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  background: #000;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
}

.fullscreen img {
  width: auto;
  height: 90%;
}
</style>

<script>
  function updateDateTime() {
    const el = document.getElementById("datetime");
    if (!el) return;

    const now = new Date();

    const text = now.toLocaleString("id-ID", {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    });

    el.innerText = text;
  }

  updateDateTime();
  setInterval(updateDateTime, 60000);
</script>
